<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de EPI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f7f6;color:#1a1a1a;font-size:15px;line-height:1.5}
  a{color:inherit}

  /* Layout */
  .page{max-width:960px;margin:0 auto;padding:24px 16px 64px}

  /* Header */
  .header{display:flex;align-items:center;gap:12px;margin-bottom:28px;flex-wrap:wrap}
  .header h1{font-size:20px;font-weight:600;color:#111;flex:none}
  .header-sep{flex:1}
  .search-wrap{position:relative;flex:1;min-width:180px;max-width:320px}
  .search-wrap input{width:100%;padding:8px 12px 8px 36px;border:1px solid #e0e0db;border-radius:8px;background:#fff;font-size:14px;outline:none;transition:border .15s}
  .search-wrap input:focus{border-color:#3b82f6}
  .search-wrap .icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#aaa;font-size:15px}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:background .15s,opacity .15s}
  .btn-primary{background:#3b82f6;color:#fff}
  .btn-primary:hover{background:#2563eb}
  .btn-secondary{background:#fff;color:#374151;border:1px solid #e0e0db}
  .btn-secondary:hover{background:#f3f4f6}
  .btn-sm{padding:5px 10px;font-size:13px}
  .btn-danger{background:#fff;color:#dc2626;border:1px solid #fca5a5}
  .btn-danger:hover{background:#fef2f2}

  /* Table */
  .table-wrap{background:#fff;border:1px solid #e8e8e4;border-radius:12px;overflow:hidden;margin-bottom:32px}
  table{width:100%;border-collapse:collapse}
  thead th{font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.04em;padding:12px 16px;border-bottom:1px solid #f0f0ec;text-align:left;background:#fafaf9}
  tbody tr{transition:background .1s}
  tbody tr:hover{background:#fafaf9}
  tbody td{padding:13px 16px;border-bottom:1px solid #f0f0ec;vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  .epi-name{font-weight:500;color:#111}

  /* Badges */
  .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:12px;font-weight:500}
  .badge-ok{background:#dcfce7;color:#166534}
  .badge-low{background:#fef3c7;color:#92400e}
  .badge-critical{background:#fee2e2;color:#991b1b}

  /* Qty */
  .qty-cell{display:flex;align-items:center;gap:8px}
  .qty-num{font-size:18px;font-weight:600;color:#111;min-width:28px}

  /* Actions btn */
  .action-btn{background:#f3f4f6;border:none;border-radius:6px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:background .15s}
  .action-btn:hover{background:#e5e7eb}

  /* Overlay */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
  .overlay.hidden{display:none}
  .modal{background:#fff;border-radius:14px;width:100%;max-width:420px;box-shadow:0 8px 40px rgba(0,0,0,.12);overflow:hidden}
  .modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid #f0f0ec}
  .modal-header h2{font-size:16px;font-weight:600}
  .modal-close{background:none;border:none;cursor:pointer;font-size:18px;color:#9ca3af;padding:2px;line-height:1;border-radius:4px}
  .modal-close:hover{color:#374151}
  .modal-body{padding:18px 20px}
  .modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:12px 20px;border-top:1px solid #f0f0ec;background:#fafaf9}

  /* Form */
  .form-group{margin-bottom:16px}
  .form-group label{display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:6px}
  .form-group input,.form-group textarea{width:100%;padding:9px 12px;border:1px solid #e0e0db;border-radius:8px;font-size:14px;outline:none;transition:border .15s;font-family:inherit}
  .form-group input:focus,.form-group textarea:focus{border-color:#3b82f6}
  .form-group textarea{resize:none;height:72px}

  /* Action detail modal */
  .action-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
  .action-card{border:1px solid #e8e8e4;border-radius:10px;padding:14px;cursor:pointer;text-align:center;transition:border .15s,background .15s}
  .action-card:hover{border-color:#3b82f6;background:#eff6ff}
  .action-card .ac-icon{font-size:22px;margin-bottom:6px}
  .action-card .ac-label{font-size:13px;font-weight:500;color:#374151}
  .ac-qty{background:#f3f4f6;border-radius:10px;padding:14px;text-align:center;margin-bottom:16px}
  .ac-qty .aq-label{font-size:12px;color:#6b7280;margin-bottom:4px}
  .ac-qty .aq-num{font-size:28px;font-weight:700;color:#111}

  /* History */
  .history-section h2{font-size:15px;font-weight:600;color:#374151;margin-bottom:12px;display:flex;align-items:center;gap:6px}
  .history-list{background:#fff;border:1px solid #e8e8e4;border-radius:12px;overflow:hidden}
  .history-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-bottom:1px solid #f0f0ec}
  .history-item:last-child{border-bottom:none}
  .hi-date{font-size:12px;color:#9ca3af;min-width:72px;padding-top:2px}
  .hi-content{flex:1}
  .hi-name{font-size:14px;font-weight:500;color:#111}
  .hi-detail{font-size:12px;color:#6b7280;margin-top:1px}
  .hi-badge{font-size:13px;font-weight:600}
  .hi-in{color:#059669}
  .hi-out{color:#dc2626}
  .empty{text-align:center;padding:32px;color:#9ca3af;font-size:14px}

  /* Responsive */
  @media(max-width:600px){
    .header{gap:8px}
    .header-sep{display:none}
    .search-wrap{max-width:none;width:100%;order:3;flex:none}
    thead th:nth-child(2){display:none}
    tbody td:nth-child(2){display:none}
    .qty-num{font-size:15px}
    .modal{max-width:100%}
  }
</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="header">
    <h1>📦 Controle de EPI</h1>
    <div class="search-wrap">
      <span class="icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Pesquisar EPI..." oninput="renderTable()">
    </div>
    <div class="header-sep"></div>
    <button class="btn btn-secondary" onclick="exportExcel()">⬇ Exportar Excel</button>
    <button class="btn btn-primary" onclick="openNewEPI()">+ Novo EPI</button>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Nome do EPI</th>
          <th>Qtd. Mínima</th>
          <th>Quantidade</th>
          <th>Situação</th>
          <th style="width:56px;text-align:center">Ações</th>
        </tr>
      </thead>
      <tbody id="epiTableBody"></tbody>
    </table>
  </div>

  <!-- History -->
  <div class="history-section">
    <h2>📋 Histórico de movimentações</h2>
    <div id="historyList" class="history-list"></div>
  </div>
</div>

<!-- OVERLAY: Detail/Actions -->
<div class="overlay hidden" id="overlayDetail">
  <div class="modal">
    <div class="modal-header">
      <h2 id="detailTitle">EPI</h2>
      <button class="modal-close" onclick="closeAll()">✕</button>
    </div>
    <div class="modal-body">
      <div class="ac-qty">
        <div class="aq-label">Quantidade atual</div>
        <div class="aq-num" id="detailQty">0</div>
      </div>
      <div class="action-grid">
        <div class="action-card" onclick="openEntrada()">
          <div class="ac-icon">➕</div>
          <div class="ac-label">Entrada</div>
        </div>
        <div class="action-card" onclick="openSaida()">
          <div class="ac-icon">➖</div>
          <div class="ac-label">Saída</div>
        </div>
        <div class="action-card" onclick="openEdit()">
          <div class="ac-icon">✏️</div>
          <div class="ac-label">Editar</div>
        </div>
        <div class="action-card" onclick="scrollToHistory()">
          <div class="ac-icon">📋</div>
          <div class="ac-label">Ver histórico</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- OVERLAY: Entrada -->
<div class="overlay hidden" id="overlayEntrada">
  <div class="modal">
    <div class="modal-header">
      <h2>+ Entrada de estoque</h2>
      <button class="modal-close" onclick="closeAll()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Quantidade</label>
        <input type="number" id="entradaQty" min="1" value="1" placeholder="Ex: 10">
      </div>
      <div class="form-group">
        <label>Observação (opcional)</label>
        <textarea id="entradaObs" placeholder="Ex: Recebido do fornecedor"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeAll()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveEntrada()">Salvar entrada</button>
    </div>
  </div>
</div>

<!-- OVERLAY: Saída -->
<div class="overlay hidden" id="overlaySaida">
  <div class="modal">
    <div class="modal-header">
      <h2>− Saída de estoque</h2>
      <button class="modal-close" onclick="closeAll()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Quantidade</label>
        <input type="number" id="saidaQty" min="1" value="1" placeholder="Ex: 2">
      </div>
      <div class="form-group">
        <label>Nome do funcionário</label>
        <input type="text" id="saidaFunc" placeholder="Ex: João Silva">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeAll()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveSaida()">Registrar saída</button>
    </div>
  </div>
</div>

<!-- OVERLAY: Edit -->
<div class="overlay hidden" id="overlayEdit">
  <div class="modal">
    <div class="modal-header">
      <h2>✏️ Editar EPI</h2>
      <button class="modal-close" onclick="closeAll()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Nome do EPI</label>
        <input type="text" id="editName" placeholder="Ex: Capacete">
      </div>
      <div class="form-group">
        <label>Quantidade mínima para alerta</label>
        <input type="number" id="editMin" min="0" value="5" placeholder="Ex: 5">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" onclick="deleteEPI()">Excluir</button>
      <div style="flex:1"></div>
      <button class="btn btn-secondary" onclick="closeAll()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveEdit()">Salvar</button>
    </div>
  </div>
</div>

<!-- OVERLAY: New EPI -->
<div class="overlay hidden" id="overlayNew">
  <div class="modal">
    <div class="modal-header">
      <h2>+ Novo EPI</h2>
      <button class="modal-close" onclick="closeAll()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Nome do EPI</label>
        <input type="text" id="newName" placeholder="Ex: Luva de látex">
      </div>
      <div class="form-group">
        <label>Quantidade inicial</label>
        <input type="number" id="newQty" min="0" value="0" placeholder="Ex: 20">
      </div>
      <div class="form-group">
        <label>Quantidade mínima para alerta</label>
        <input type="number" id="newMin" min="0" value="5" placeholder="Ex: 5">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeAll()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveNew()">Adicionar</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'epi_data_v2';

const defaultEPIs = [
  {id:1,name:'Botina preta',qty:20,minQty:5},
  {id:2,name:'Bota de PVC',qty:15,minQty:5},
  {id:3,name:'Óculos preto',qty:30,minQty:8},
  {id:4,name:'Respirador facial',qty:4,minQty:6},
  {id:5,name:'Capa de chuva',qty:12,minQty:5},
  {id:6,name:'Máscara',qty:2,minQty:10},
  {id:7,name:'Colete',qty:8,minQty:5},
  {id:8,name:'Camisa',qty:18,minQty:5},
  {id:9,name:'Capacete',qty:25,minQty:8},
];

let state = load();
let currentId = null;

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return {epis: defaultEPIs.map(e=>({...e})), history:[], nextId:10};
}

function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function statusInfo(epi){
  if(epi.qty === 0) return {label:'Sem estoque', cls:'badge-critical'};
  if(epi.qty <= epi.minQty) return {label:'Acabando', cls:'badge-low'};
  return {label:'Bom', cls:'badge-ok'};
}

function fmtDate(ts){
  const d = new Date(ts);
  return d.toLocaleDateString('pt-BR');
}

function renderTable(){
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const tbody = document.getElementById('epiTableBody');
  const filtered = state.epis.filter(e=>e.name.toLowerCase().includes(q));
  if(!filtered.length){
    tbody.innerHTML = `<tr><td colspan="5" class="empty">Nenhum EPI encontrado</td></tr>`;
    return;
  }
  tbody.innerHTML = filtered.map(epi=>{
    const s = statusInfo(epi);
    return `<tr>
      <td class="epi-name">${esc(epi.name)}</td>
      <td style="color:#6b7280;font-size:14px">${epi.minQty}</td>
      <td>
        <div class="qty-cell">
          <span class="qty-num">${epi.qty}</span>
        </div>
      </td>
      <td><span class="badge ${s.cls}">${s.label}</span></td>
      <td style="text-align:center"><button class="action-btn" title="Ações" onclick="openDetail(${epi.id})">⚙</button></td>
    </tr>`;
  }).join('');
}

function renderHistory(){
  const list = document.getElementById('historyList');
  if(!state.history.length){
    list.innerHTML = `<div class="empty">Nenhuma movimentação registrada ainda.</div>`;
    return;
  }
  const sorted = [...state.history].reverse();
  list.innerHTML = sorted.map(h=>{
    const cls = h.type==='entrada'?'hi-in':'hi-out';
    const sign = h.type==='entrada'?'+':'-';
    const detail = h.type==='entrada'
      ? (h.obs ? `Obs: ${esc(h.obs)}` : '')
      : (h.func ? `Funcionário: ${esc(h.func)}` : '');
    return `<div class="history-item">
      <div class="hi-date">${fmtDate(h.ts)}</div>
      <div class="hi-content">
        <div class="hi-name"><span class="hi-badge ${cls}">${sign}${h.qty}</span> ${esc(h.epiName)}</div>
        ${detail?`<div class="hi-detail">${detail}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function render(){
  renderTable();
  renderHistory();
}

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function closeAll(){
  document.querySelectorAll('.overlay').forEach(o=>o.classList.add('hidden'));
}

function openDetail(id){
  currentId = id;
  const epi = state.epis.find(e=>e.id===id);
  document.getElementById('detailTitle').textContent = epi.name;
  document.getElementById('detailQty').textContent = epi.qty;
  show('overlayDetail');
}

function openEntrada(){
  document.getElementById('entradaQty').value = 1;
  document.getElementById('entradaObs').value = '';
  closeAll();
  show('overlayEntrada');
}

function openSaida(){
  document.getElementById('saidaQty').value = 1;
  document.getElementById('saidaFunc').value = '';
  closeAll();
  show('overlaySaida');
}

function openEdit(){
  const epi = state.epis.find(e=>e.id===currentId);
  document.getElementById('editName').value = epi.name;
  document.getElementById('editMin').value = epi.minQty;
  closeAll();
  show('overlayEdit');
}

function openNewEPI(){
  document.getElementById('newName').value = '';
  document.getElementById('newQty').value = 0;
  document.getElementById('newMin').value = 5;
  show('overlayNew');
}

function show(id){
  document.getElementById(id).classList.remove('hidden');
}

function saveEntrada(){
  const qty = parseInt(document.getElementById('entradaQty').value)||0;
  const obs = document.getElementById('entradaObs').value.trim();
  if(qty<=0){alert('Informe uma quantidade válida.');return;}
  const epi = state.epis.find(e=>e.id===currentId);
  epi.qty += qty;
  state.history.push({type:'entrada',epiId:currentId,epiName:epi.name,qty,obs,ts:Date.now()});
  save(); closeAll(); render();
}

function saveSaida(){
  const qty = parseInt(document.getElementById('saidaQty').value)||0;
  const func = document.getElementById('saidaFunc').value.trim();
  if(qty<=0){alert('Informe uma quantidade válida.');return;}
  if(!func){alert('Informe o nome do funcionário.');return;}
  const epi = state.epis.find(e=>e.id===currentId);
  if(epi.qty < qty){alert('Quantidade insuficiente em estoque.');return;}
  epi.qty -= qty;
  state.history.push({type:'saida',epiId:currentId,epiName:epi.name,qty,func,ts:Date.now()});
  save(); closeAll(); render();
}

function saveEdit(){
  const name = document.getElementById('editName').value.trim();
  const minQty = parseInt(document.getElementById('editMin').value)||0;
  if(!name){alert('Informe o nome do EPI.');return;}
  const epi = state.epis.find(e=>e.id===currentId);
  epi.name = name;
  epi.minQty = minQty;
  save(); closeAll(); render();
}

function deleteEPI(){
  if(!confirm('Tem certeza que deseja excluir este EPI?')) return;
  state.epis = state.epis.filter(e=>e.id!==currentId);
  save(); closeAll(); render();
}

function saveNew(){
  const name = document.getElementById('newName').value.trim();
  const qty = parseInt(document.getElementById('newQty').value)||0;
  const minQty = parseInt(document.getElementById('newMin').value)||5;
  if(!name){alert('Informe o nome do EPI.');return;}
  state.epis.push({id:state.nextId++,name,qty,minQty});
  save(); closeAll(); render();
}

function scrollToHistory(){
  closeAll();
  document.querySelector('.history-section').scrollIntoView({behavior:'smooth'});
}

function exportExcel(){
  const wsData = [
    ['Nome do EPI','Quantidade Atual','Qtd. Mínima','Situação'],
    ...state.epis.map(e=>[e.name, e.qty, e.minQty, statusInfo(e).label])
  ];
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols'] = [{wch:24},{wch:16},{wch:14},{wch:16}];

  const wsHist = [
    ['Data','Tipo','EPI','Quantidade','Funcionário/Observação'],
    ...[...state.history].reverse().map(h=>[
      fmtDate(h.ts),
      h.type==='entrada'?'Entrada':'Saída',
      h.epiName,
      (h.type==='entrada'?'+':'-')+h.qty,
      h.type==='entrada'?(h.obs||''):(h.func||'')
    ])
  ];
  const wsH = XLSX.utils.aoa_to_sheet(wsHist);
  wsH['!cols'] = [{wch:12},{wch:10},{wch:22},{wch:12},{wch:28}];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Estoque');
  XLSX.utils.book_append_sheet(wb, wsH, 'Histórico');
  XLSX.writeFile(wb, 'controle-epi.xlsx');
}

// Close overlay on backdrop click
document.querySelectorAll('.overlay').forEach(o=>{
  o.addEventListener('click',e=>{if(e.target===o)closeAll();});
});

// Init
render();
</script>
</body>
</html>
